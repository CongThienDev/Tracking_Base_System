name: tracking-base-infra

services:
  redis:
    image: redis:7-alpine
    container_name: tracking-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - tracking-base-net

volumes:
  redis_data:

networks:
  tracking-base-net:
    name: tracking-base-net
